<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Checkout - ArtByAfricans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-[100dvh] flex flex-col">

    <div class="max-w-5xl mx-auto w-full px-4 sm:px-6 py-8 sm:py-12 flex-1">
        <a href="index.html" class="inline-flex items-center gap-2 text-[#9C6644] mb-6 sm:mb-8 hover:underline text-sm sm:text-base font-medium">
            ← Back to shop
        </a>

        <h1 class="heading-font text-3xl sm:text-5xl font-bold text-center mb-8 sm:mb-12 text-[#2a2420]">Checkout</h1>

        <div class="grid lg:grid-cols-5 gap-8 lg:gap-12">
            
            <!-- Order Summary -->
            <div class="lg:col-span-3">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-receipt text-[#9C6644]"></i>
                    Order Summary
                </h2>
                
                <div id="checkout-items" class="space-y-6 mb-10">
                    <!-- Populated by JavaScript -->
                </div>

                <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
                    <div class="space-y-4 text-base">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Subtotal</span>
                            <span id="subtotal" class="font-medium">GHS 0</span>
                        </div>
                        <div class="flex justify-between">
                            <span id="delivery-label" class="text-gray-600">Delivery</span>
                            <span id="delivery-fee-display" class="font-medium">GHS 0</span>
                        </div>
                        <div class="h-px bg-gray-200 my-2"></div>
                        <div class="flex justify-between text-xl font-bold text-[#2a2420]">
                            <span>Total</span>
                            <span id="total" class="text-[#9C6644]">GHS 0</span>
                        </div>
                    </div>
                    <p id="delivery-note" class="text-xs text-gray-500 mt-4 leading-relaxed">
                        Delivery fees are estimates. Final cost may vary based on exact location and weight.
                    </p>
                </div>
            </div>

            <!-- Delivery & Payment -->
            <div class="lg:col-span-2 space-y-10">
                
                <!-- Delivery Details -->
                <div>
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-truck text-[#9C6644]"></i>
                        Delivery Details
                    </h2>
                    
                    <div class="bg-white border border-gray-100 rounded-3xl p-6 space-y-6 shadow-sm">
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">Country / Region</label>
                            <select id="delivery-zone" class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base focus:border-[#9C6644] focus:ring-1 focus:ring-[#9C6644]">
                                <option value="gh-greater-accra">Ghana — Greater Accra</option>
                                <option value="gh-other">Ghana — Other regions</option>
                                <option value="west-africa">West Africa</option>
                                <option value="africa-other">Africa — Other</option>
                                <option value="eu-uk">Europe / United Kingdom</option>
                                <option value="americas">Americas</option>
                                <option value="asia-pacific">Asia / Pacific</option>
                                <option value="other-intl">Other international</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">City / Town</label>
                            <input type="text" id="delivery-city" placeholder="e.g. Accra, Kumasi, Lagos, London" 
                                   class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base focus:border-[#9C6644]">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">Street Address / Landmark / Digital Address</label>
                            <textarea id="delivery-address" rows="3" placeholder="House number, street name, eg GA-934-4527..." 
                                      class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base focus:border-[#9C6644] resize-y"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-700">Recipient Phone (with country code)</label>
                            <input type="tel" id="delivery-phone" placeholder="+233 " 
                                   class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base focus:border-[#9C6644]">
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div>
                    <h2 class="text-2xl font-semibold mb-6">Payment Method</h2>
                    
                    <div class="space-y-4">
                        <!-- Mobile Money -->
                        <label class="flex items-start gap-4 border-2 border-transparent hover:border-[#9C6644] p-5 rounded-3xl cursor-pointer transition-all has-[:checked]:border-[#9C6644] bg-white">
                            <input type="radio" name="payment" value="mobile" checked class="mt-1 w-5 h-5 accent-[#9C6644]">
                            <div class="flex-1">
                                <p class="font-semibold">Mobile Money</p>
                                <p class="text-sm text-gray-600">MTN MoMo, AirtelTigo, Vodafone Cash</p>
                            </div>
                        </label>

                        <!-- Card -->
                        <label class="flex items-start gap-4 border-2 border-transparent hover:border-[#9C6644] p-5 rounded-3xl cursor-pointer transition-all has-[:checked]:border-[#9C6644] bg-white">
                            <input type="radio" name="payment" value="card" class="mt-1 w-5 h-5 accent-[#9C6644]">
                            <div class="flex-1">
                                <p class="font-semibold">Card Payment</p>
                                <p class="text-sm text-gray-600">Visa, Mastercard </p>
                            </div>
                        </label>
                    </div>

                    <!-- Mobile Money Form -->
                    <div id="mobile-form" class="mt-6 bg-white border border-gray-100 rounded-3xl p-6">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium mb-2">Mobile Money Number</label>
                                <input type="tel" id="phone" value="+233 " 
                                       class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Network</label>
                                <select class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base">
                                    <option>MTN MoMo</option>
                                    <option>AirtelTigo Money</option>
                                    <option>Vodafone Cash</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Card Form (hidden for now) -->
                    <div id="card-form" class="hidden mt-6 bg-white border border-gray-100 rounded-3xl p-6 space-y-5">
                        <div>
                            <label class="block text-sm font-medium mb-2">Card Number</label>
                            <input type="text" placeholder="4455 " class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Expiry Date</label>
                                <input type="text" placeholder="MM/YY" class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">CVV</label>
                                <input type="text" placeholder="123" maxlength="4" class="w-full px-4 py-3.5 border border-gray-200 rounded-2xl text-base">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pay Button -->
                <button id="pay-button"
                        onclick="completeCheckout()"
                        class="w-full bg-[#9C6644] hover:bg-[#8A5A3E] text-white py-5 rounded-3xl text-lg font-semibold transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                    <span id="pay-text">Pay Now</span>
                    <span id="pay-total" class="font-bold"></span>
                </button>

                <p class="text-center text-xs text-gray-500 mt-4">
                    Secure checkout • Your data is protected
                </p>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 text-center">
            <div class="w-20 h-20 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-check text-4xl text-green-600"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">Payment Successful!</h3>
            <p id="success-message" class="text-gray-600 mb-8"></p>
            
            <button onclick="finishCheckout()" 
                    class="w-full bg-[#9C6644] text-white py-4 rounded-2xl font-semibold text-lg">
                Continue Shopping
            </button>
        </div>
    </div>

    <footer class="site-footer mt-auto shrink-0 border-t border-[#2a2420] bg-gradient-to-b from-[#1f1a16] to-[#181410] text-gray-400">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 text-xs">
            <a href="index.html" class="text-[#c4a574] hover:underline">← ArtByAfricans</a>
            <span class="text-[#c4a574] font-medium">Made by Frost</span>
        </div>
    </footer>

    <script>
        const DELIVERY_FEES = {
            'gh-greater-accra': { amount: 50, label: 'Greater Accra' },
            'gh-other': { amount: 90, label: 'Other Regions (Ghana)' },
            'west-africa': { amount: 200, label: 'West Africa' },
            'africa-other': { amount: 250, label: 'Other Africa' },
            'eu-uk': { amount: 350, label: 'Europe / UK' },
            'americas': { amount: 450, label: 'Americas' },
            'asia-pacific': { amount: 500, label: 'Asia / Pacific' },
            'other-intl': { amount: 600, label: 'Other International' }
        };

        let currentTotal = 0;

        function getDeliveryFee() {
            const zone = document.getElementById('delivery-zone').value;
            return DELIVERY_FEES[zone] || DELIVERY_FEES['other-intl'];
        }

        function recalcTotals() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const subtotal = cart.reduce((sum, item) => sum + (item.price || 0), 0);
            const deliveryData = getDeliveryFee();
            
            document.getElementById('subtotal').textContent = `GHS ${subtotal}`;
            document.getElementById('delivery-fee-display').textContent = `GHS ${deliveryData.amount}`;
            document.getElementById('delivery-label').textContent = `Delivery (${deliveryData.label})`;
            currentTotal = subtotal + deliveryData.amount;
            document.getElementById('total').textContent = `GHS ${currentTotal}`;
            document.getElementById('pay-total').textContent = `GHS ${currentTotal}`;
        }

        function loadCheckoutItems() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('checkout-items');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center py-12">Your cart is empty</p>`;
                return;
            }

            cart.forEach(item => {
                const thumb = (Array.isArray(item.images) && item.images[0]) || item.image || '';
                
                const customText = item.customizations 
                    ? `${item.customizations.color || ''}, ${item.customizations.beads || ''} beads, ${item.customizations.name || 'Standard'}`
                    : 'Standard specification';

                container.innerHTML += `
                    <div class="flex gap-4 bg-white p-4 rounded-2xl border border-gray-100">
                        <img src="${thumb}" alt="" class="w-20 h-20 object-cover rounded-xl shrink-0">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium leading-tight">${item.title}</p>
                            <p class="text-sm text-gray-500 mt-0.5">${item.artisan}</p>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">${customText}</p>
                            <p class="font-semibold text-[#9C6644] mt-2">GHS ${item.price}</p>
                        </div>
                    </div>
                `;
            });
        }

        function completeCheckout() {
            const city = document.getElementById('delivery-city').value.trim();
            const address = document.getElementById('delivery-address').value.trim();
            const phone = document.getElementById('delivery-phone').value.trim();

            if (!city || !address || !phone) {
                alert("Please fill in City, Address, and Recipient Phone to continue.");
                return;
            }

            const payBtn = document.getElementById('pay-button');
            const originalText = payBtn.innerHTML;
            payBtn.disabled = true;
            payBtn.innerHTML = `
                <i class="fa-solid fa-spinner fa-spin"></i>
                <span>Processing payment...</span>
            `;

            // Simulate payment processing
            setTimeout(() => {
                const deliveryData = getDeliveryFee();
                
                document.getElementById('success-message').innerHTML = `
                    Thank you!<br>
                    Order total: <strong>GHS ${currentTotal}</strong><br><br>
                    Delivery to: ${city}<br>
                    Zone: ${deliveryData.label}
                `;
                
                document.getElementById('success-modal').classList.remove('hidden');
                document.getElementById('success-modal').classList.add('flex');
                
                // Clear cart
                localStorage.removeItem('cart');
            }, 1800);
        }

        function finishCheckout() {
            document.getElementById('success-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('flex');
            window.location.href = 'index.html';
        }

        // Event Listeners
        document.getElementById('delivery-zone').addEventListener('change', recalcTotals);

        // Toggle payment forms
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', () => {
                if (radio.value === 'mobile') {
                    document.getElementById('mobile-form').classList.remove('hidden');
                    document.getElementById('card-form').classList.add('hidden');
                } else {
                    document.getElementById('mobile-form').classList.add('hidden');
                    document.getElementById('card-form').classList.remove('hidden');
                }
            });
        });

        // Initialize
        window.onload = () => {
            loadCheckoutItems();
            recalcTotals();
        };
    </script>
</body>
</html>
